<svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="herbs-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f8e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcedc8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="150" fill="url(#herbs-gradient)" stroke="#8bc34a" stroke-width="2"/>
  
  <!-- Herb Icons -->
  <circle cx="60" cy="60" r="19" fill="#8bc34a" opacity="0.3"/>
  <text x="60" y="68" text-anchor="middle" font-size="24" fill="#558b2f">🌿</text>
  
  <circle cx="140" cy="65" r="18" fill="#8bc34a" opacity="0.2"/>
  <text x="140" y="73" text-anchor="middle" font-size="22" fill="#558b2f">🌿</text>
  
  <circle cx="100" cy="105" r="16" fill="#8bc34a" opacity="0.25"/>
