<svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vegetables-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="150" fill="url(#vegetables-gradient)" stroke="#4caf50" stroke-width="2"/>
  
  <!-- Vegetable Icons -->
  <circle cx="60" cy="60" r="20" fill="#4caf50" opacity="0.3"/>
  <text x="60" y="68" text-anchor="middle" font-size="24" fill="#2e7d32">🥬</text>
  
  <circle cx="140" cy="60" r="20" fill="#4caf50" opacity="0.3"/>
  <text x="140" y="68" text-anchor="middle" font-size="24" fill="#2e7d32">🥕</text>
  
  <circle cx="100" cy="100" r="18" fill="#4caf50" opacity="0.2"/>
  <text x="100" y="108" text-anchor="middle" font-size="20" fill="#2e7d32">🍅</text>
  
  <!-- Text -->
  <text x="100" y="130" text-anchor="middle" font-family="Inclusive Sans, Arial, sans-serif" font-size="16" fill="#2e7d32" font-weight="600">
    Fresh Vegetables
  </text>
</svg>
