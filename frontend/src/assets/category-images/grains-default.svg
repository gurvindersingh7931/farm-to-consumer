<svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grains-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffecb3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="150" fill="url(#grains-gradient)" stroke="#ff8f00" stroke-width="2"/>
  
  <!-- Grain Icons -->
  <circle cx="70" cy="60" r="18" fill="#ff8f00" opacity="0.3"/>
  <text x="70" y="68" text-anchor="middle" font-size="22" fill="#e65100">🌾</text>
  
  <circle cx="130" cy="65" r="20" fill="#ff8f00" opacity="0.2"/>
  <text x="130" y="73" text-anchor="middle" font-size="20" fill="#e65100">🌾</text>
  
  <rect x="85" y="90" width="30" height="20" rx="3" fill="#ff8f00" opacity="0.25"/>
  <text x="100" y="102" text-anchor="middle" font-size="16" fill="#e65100">🌱</text>
  
  <!-- Text -->
  <text x="100" y="135" text-anchor="middle" font-family="Inclusive Sans, Arial, sans-serif" font-size="16" fill="#e65100" font-weight="600">
    Premium Grains
  </text>
</svg>
