<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="page-header">
    <div class="container">
      <div class="page-header-inner">
        <h1 class="text-2xl font-bold text-gray-900">🛒 Consumer Dashboard</h1>
        <div></div>
      </div>
    </div>
  </header>

  <main class="container py-8">
    <!-- Dashboard Grid -->
    <div class="grid-stats">
      <!-- Fresh Products -->
      <div class="card group cursor-pointer hover:shadow-soft-lg hover:-translate-y-1">
        <div class="card-body text-center">
          <!-- frontend/src/assets/category-images/fresh-products-icon.png -->
          <div class="text-4xl mb-4 fresh-products-icon-container"><img src="assets/category-images/fresh-products-icon.png" alt="Fresh Products" class="w-16 h-16"></div>
          <h3 class="text-xl font-semibold text-gray-900 mb-2">Fresh Products</h3>
          <p class="text-gray-600 mb-6">Browse fresh products from local farmers</p>
          <button class="btn btn-primary w-full" routerLink="/browse-crops">Shop Now</button>
        </div>
      </div>

      <!-- My Orders -->
      <div class="card group cursor-pointer hover:shadow-soft-lg hover:-translate-y-1">
        <div class="card-body text-center">
          <div class="text-4xl mb-4">🛍️</div>
          <h3 class="text-xl font-semibold text-gray-900 mb-2">My Orders</h3>
          <p class="text-gray-600 mb-6">Track your orders and delivery status</p>
          <button class="btn btn-primary w-full">View Orders</button>
        </div>
      </div>

      <!-- Favorites -->
      <div class="card group cursor-pointer hover:shadow-soft-lg hover:-translate-y-1">
        <div class="card-body text-center">
          <div class="text-4xl mb-4">❤️</div>
          <h3 class="text-xl font-semibold text-gray-900 mb-2">Favorites</h3>
          <p class="text-gray-600 mb-6">Your favorite farmers and products</p>
          <button class="btn btn-primary w-full">View Favorites</button>
        </div>
      </div>

      <!-- Local Farmers -->
      <div class="card group cursor-pointer hover:shadow-soft-lg hover:-translate-y-1">
        <div class="card-body text-center">
          <div class="text-4xl mb-4">📍</div>
          <h3 class="text-xl font-semibold text-gray-900 mb-2">Local Farmers</h3>
          <p class="text-gray-600 mb-6">Discover farmers in your area</p>
          <button class="btn btn-primary w-full" routerLink="/farmers">Find Farmers</button>
        </div>
      </div>
    </div>
  </main>
