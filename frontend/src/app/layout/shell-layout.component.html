<div class="h-screen flex flex-col bg-gray-50 text-gray-900 overflow-hidden">
  <!-- Header -->
  <header class="navbar">
    <div class="w-full">
      <div class="flex items-center justify-between py-3 px-0">
        <div class="flex items-center gap-3">
          <button
            class="btn btn-secondary btn-sm focus:outline-none focus:ring-0 focus-visible:outline-none active:outline-none flex items-center gap-1 md:hidden"
            type="button"
            aria-label="Toggle sidebar"
            (click)="toggleSidebar()"
          >
            <mat-icon fontIcon="menu"></mat-icon>
          </button>
          <a routerLink="/" class="navbar-brand" matTooltip="Farm">Farm-to-Consumer</a>
        </div>
        <div class="flex items-center gap-4">
          <img
            *ngIf="user"
            [src]="avatarUrl || '/assets/default-farmer.png'"
            alt="user"
            class="w-8 h-8 rounded-full object-cover"
          />
          <button *ngIf="user" class="btn btn-secondary btn-sm" (click)="logout()">Logout</button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside
      class="bg-white border-r border-gray-100 transition-transform duration-200 ease-out"
      [ngClass]="
        sidebarOpen
          ? 'block md:block fixed md:static left-0 md:left-auto top-16 md:top-auto z-[10000] w-64 shadow-lg md:shadow-none'
          : 'hidden md:block md:static md:w-64 md:shadow-none'
      "
    >
      <nav class="p-4 space-y-1">
        <a
          *ngFor="let item of menuItems"
          [routerLink]="item.path"
          routerLinkActive="!bg-[color:var(--color-primary-soft)] !text-[color:var(--color-primary)]"
          (click)="onNavClick()"
          class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition-colors">
          <mat-icon [fontIcon]="item.icon" class="!text-base"></mat-icon>
          <span>{{ item.label }}</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto">
      <div class="container py-6">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
